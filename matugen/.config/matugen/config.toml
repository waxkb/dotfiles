[config]
version_check = false

[templates.btop]
input_path = "/home/max/.config/matugen/templates/btop.theme"
output_path = "/home/max/.config/btop/themes/matugen.theme"
post_hook = "pkill -SIGUSR2 btop"

[templates.zen]
input_path = "/home/max/.config/matugen/templates/userChrome.css"
output_path = "/home/max/.zen/davnng42.Default (release)/chrome/userChrome.css"

[templates.zen1]
input_path = "/home/max/.config/matugen/templates/userContent.css"
output_path = "/home/max/.zen/davnng42.Default (release)/chrome/userContent.css"

[templates.zen2]
input_path = "/home/max/.config/matugen/templates/zen-logo-mocha.svg"
output_path = "/home/max/.zen/davnng42.Default (release)/chrome/zen-mocha.svg"

[templates.niri]
input_path = "/home/max/.config/matugen/templates/colors.kdl"
output_path = "/home/max/dotfiles/niri/.config/niri/colors.kdl"

[templates.vicinae]
input_path = "/home/max/.config/matugen/templates/vicinae.toml"
output_path = "~/.local/share/vicinae/themes/matugen.toml"
post_hook = "vicinae theme set matugen"

[templates.lualine]
input_path = "/home/max/.config/matugen/templates/dank-lualine.lua"
output_path = "/home/max/.config/nvim/lua/plugins/dank-lualine.lua"

[font]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"
size = 16

[cursor.model]
path = "CairoSpinyMouse.obj"
scale_factor = 6.0
brightness = 0.5
x_offset = 0.5
plane_offset = 18.0
visible = true

[cursor.animation]
spin_speed = 1.4
bob_speed = 2.2
bob_amplitude = 0.08

[bindings]
keys = [
  { key = "C", with = "Control | shift", action = "Copy" },
  { key = "V", with = "Control | shift", action = "Paste" },
  { key = "Equal", with = "Control", action = "IncreaseFontSize" },
  { key = "Minus", with = "Control", action = "DecreaseFontSize" },
  { key = "Digit0", with = "Control | shift", action = "ResetFontSize" },
  { key = "Enter", with = "Control | shift", action = "Toggle3DMode" },
  { key = "M", with = "Control | shift", action = "ToggleMobiusMode" },
  { key = "Up", with = "Control | shift", action = "IncreaseWarp" },
  { key = "Down", with = "Control | shift", action = "DecreaseWarp" },
]

[theme]
foreground = "{{colors.on_surface.default.hex}}"
background = "{{colors.background.default.hex}}"
cursor = "{{colors.on_surface.default.hex}}"

[theme.normal]
black = "{{dank16.color0.default.hex}}"
red = "{{dank16.color1.default.hex}}"
green = "{{dank16.color2.default.hex}}"
yellow = "{{dank16.color3.default.hex}}"
blue = "{{dank16.color4.default.hex}}"
magenta = "{{dank16.color5.default.hex}}"
cyan = "{{dank16.color6.default.hex}}"
white = "{{dank16.color7.default.hex}}"

[theme.bright]
black = "{{dank16.color8.default.hex}}"
red = "{{dank16.color9.default.hex}}"
green = "{{dank16.color10.default.hex}}"
yellow = "{{dank16.color11.default.hex}}"
blue = "{{dank16.color12.default.hex}}"
magenta = "{{dank16.color13.default.hex}}"
cyan = "{{dank16.color14.default.hex}}"
white = "{{dank16.color15.default.hex}}"

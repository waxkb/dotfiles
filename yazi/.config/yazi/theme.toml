# : Manager [[[

[mgr]
cwd = { fg = "#e7e2d5" }

# Tab
tab_active = { fg = "#373100", bg = "#d5c871", bold = true }
tab_inactive = { fg = "#f2e48a", bg = "#201c00" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#74d499", bg = "#74d499" }
marker_cut = { fg = "#c2ecd2", bg = "#c2ecd2" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#a7d0b7", bg = "#a7d0b7" }

# Count
count_copied = { fg = "#002113", bg = "#c2ecd2" }
count_cut = { fg = "#002113", bg = "#c2ecd2" }
count_selected = { fg = "#373100", bg = "#a7d0b7" }

# Border
border_symbol = " "
border_style  = { fg = "#d5c871" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#373100", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#d5c871", fg = "#373100", bold = true }
normal_alt  = { bg = "#4a473a", fg = "#ccc6b5" }

# Select mode
select_main = { bg = "#cec7a2", fg = "#353117", bold = true }
select_alt  = { bg = "#4a473a", fg = "#ccc6b5" }

# Unset mode
unset_main = { bg = "#a7d0b7", fg = "#113726", bold = true }
unset_alt  = { bg = "#4a473a", fg = "#ccc6b5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#d5c871", bg = "#3b3930" }
progress_error = { fg = "#ffb4ab", bg = "#3b3930" }

# Permissions
permissions_t = { fg = "#8d824a" }
permissions_w = { fg = "#4d9168" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#4dc87c" }
permissions_s = { fg = "#ccb417" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#d5c871" }
active = { fg = "#a7d0b7", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#d5c871" }
value = { fg = "#e7e2d5" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#d5c871", bold = true, bg = "#15130c" }
inactive = { fg = "#cec7a2", bg = "#15130c" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#d5c871", bg = "#373100" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#d5c871" }
title = {}
hovered = { fg = "#c2ecd2", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3b3930" }
cand = { fg = "#d5c871" }
rest = { fg = "#373100" }
desc = { fg = "#e7e2d5" }
separator = " ▶ "
separator_style = { fg = "#e7e2d5" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e7e2d5" }
run = { fg = "#e7e2d5" }
footer = { fg = "#353117", bg = "#cec7a2" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#a7d0b7" }
title_warn = { fg = "#d5c871" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e7e2d5" },
    { name = "*/", fg = "#d5c871" },
]

# : ]]]
